name: Remote News Agent

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Preflight required secrets
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error title=Missing Secret::OPENAI_API_KEY is not configured. Go to Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi

      - name: Run remote collector + remote OpenAI curation
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          OPENAI_API_BASE: ${{ vars.OPENAI_API_BASE }}
          OPENAI_SITE_URL: ${{ vars.OPENAI_SITE_URL }}
          OPENAI_APP_NAME: ${{ vars.OPENAI_APP_NAME }}
          REMOTE_CRAWL_ONLY: "0"
          REMOTE_ALLOW_RULE_FALLBACK: "0"
          REMOTE_MAX_CANDIDATES: ${{ vars.REMOTE_MAX_CANDIDATES }}
          REMOTE_MAX_FEED_ITEMS: ${{ vars.REMOTE_MAX_FEED_ITEMS }}
          OPENAI_STAGE1_CHUNK_SIZE: ${{ vars.OPENAI_STAGE1_CHUNK_SIZE }}
          OPENAI_STAGE1_PICK_COUNT: ${{ vars.OPENAI_STAGE1_PICK_COUNT }}
          OPENAI_STAGE2_POOL_LIMIT: ${{ vars.OPENAI_STAGE2_POOL_LIMIT }}
          OPENAI_REQUEST_GAP_MS: ${{ vars.OPENAI_REQUEST_GAP_MS }}
          RAW_MAX_AGE_HOURS: ${{ vars.RAW_MAX_AGE_HOURS }}
          REMOTE_OUTPUT_JSON: remote/news.remote.json
          REMOTE_OUTPUT_JS: remote/news.remote.js
        run: node tools/remote-news-openai-agent.mjs

      - name: Commit and push if changed
        run: |
          if [ -n "$(git status --porcelain -- remote/news.remote.json remote/news.remote.js)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add remote/news.remote.json remote/news.remote.js
            git commit -m "chore(remote-news): refresh snapshot [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi
